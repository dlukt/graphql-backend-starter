# schema tells gqlgen when the GraphQL schema is located.
schema:
  - ent.graphql
  - tarife.graphql

# Where should the generated server code go?
exec:
  layout: follow-schema
  dir: graph/generated
  package: generated

# resolver reports where the resolver implementations go.
resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"

# gqlgen will search for any type names in the schema in these go packages
# if they match it will use them, otherwise it will generate them.

# autobind tells gqngen to search for any type names in the GraphQL schema in the
# provided package. If they match it will use them, otherwise it will generate new.
autobind:
  - github.com/deicod/tarife/ent
  - github.com/deicod/tarife/ent/addon
  - github.com/deicod/tarife/ent/bandwidth
  - github.com/deicod/tarife/ent/onetimefee
  - github.com/deicod/tarife/ent/plan
  - github.com/deicod/tarife/ent/pricetier
  - github.com/deicod/tarife/ent/promo
  - github.com/deicod/tarife/ent/provider
  - github.com/deicod/tarife/ent/snapshot

# This section declares type mapping between the GraphQL and Go type systems.
models:
  ID:
    model:
      - github.com/deicod/tarife/ent/schema/xidgql.ID
  Node:
    model:
      - github.com/deicod/tarife/ent.Noder
